name: PR Slash Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  handle-pr-commands:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Handle /lgtm and /approve
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const commentBody = (context.payload.comment.body || "").trim();
            const commenter = context.payload.comment.user.login;

            // Only process exact slash commands.
            if (commentBody !== "/lgtm" && commentBody !== "/approve") {
              core.info("Not a supported slash command, skipping.");
              return;
            }

            // Ensure target pull request is still open.
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issueNumber
            });
            if (pr.state !== "open") {
              core.info(`PR #${issueNumber} is not open, skipping.`);
              return;
            }

            if (commentBody === "/lgtm") {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issueNumber,
                labels: ["lgtm"]
              });
              core.info(`Added label lgtm on PR #${issueNumber}.`);
              return;
            }

            // /approve is restricted to users listed in OWNERS.
            const owners = fs.readFileSync("OWNERS", "utf8")
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter((line) => line && !line.startsWith("#"));

            if (!owners.includes(commenter)) {
              core.setFailed(
                `@${commenter} is not listed in OWNERS and cannot use /approve.`
              );
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ["approved"]
            });
            core.info(`Added label approved on PR #${issueNumber}.`);
