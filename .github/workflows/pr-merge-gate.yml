name: PR Merge Gate

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review]

permissions:
  pull-requests: read

jobs:
  require-label-lgtm:
    name: Require label lgtm
    runs-on: ubuntu-latest
    steps:
      - name: Check lgtm label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.pull_request.labels.map((label) => label.name);

            if (!labels.includes("lgtm")) {
              core.setFailed("PR requires label: lgtm.");
              return;
            }

            core.info("PR has required label: lgtm.");

  require-label-approved:
    name: Require label approved
    runs-on: ubuntu-latest
    steps:
      - name: Check approved label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.pull_request.labels.map((label) => label.name);

            if (!labels.includes("approved")) {
              core.setFailed("PR requires label: approved.");
              return;
            }

            core.info("PR has required label: approved.");
