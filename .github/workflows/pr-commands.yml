name: PR Commands

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  handle-pr-commands:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Handle /lgtm and /approve
        id: handle
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const commentBody = (context.payload.comment.body || "").trim();
            const commenter = context.payload.comment.user.login;

            core.setOutput("ready", "false");

            if (commentBody !== "/lgtm" && commentBody !== "/approve") {
              core.info("Not a supported slash command, skipping.");
              return;
            }

            const owners = fs.readFileSync("OWNERS", "utf8")
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter((line) => line && !line.startsWith("#"));

            if (!owners.includes(commenter)) {
              core.setFailed(
                `@${commenter} is not listed in OWNERS and cannot use ${commentBody}.`
              );
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issueNumber
            });
            if (pr.state !== "open") {
              core.info(`PR #${issueNumber} is not open, skipping.`);
              return;
            }
            const headSha = pr.head.sha;

            const label = commentBody === "/lgtm" ? "lgtm" : "approved";
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: [label]
            });
            core.info(`Added label ${label} on PR #${issueNumber}.`);

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber
            });
            const labels = issue.labels.map((l) => l.name);
            const hasLgtm = labels.includes("lgtm");
            const hasApproved = labels.includes("approved");

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: headSha,
              context: "merge-gate/lgtm",
              state: hasLgtm ? "success" : "failure",
              description: hasLgtm ? "lgtm label present." : "PR requires lgtm label."
            });
            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: headSha,
              context: "merge-gate/approved",
              state: hasApproved ? "success" : "failure",
              description: hasApproved ? "approved label present." : "PR requires approved label."
            });

            if (!hasLgtm || !hasApproved) {
              core.info(
                `PR #${issueNumber} not yet ready (lgtm=${hasLgtm}, approved=${hasApproved}).`
              );
              return;
            }

            core.setOutput("ready", "true");
            core.setOutput("pr_node_id", pr.node_id);
            core.setOutput("pr_number", String(issueNumber));

      - name: Enable auto-merge
        if: steps.handle.outputs.ready == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const prNodeId = "${{ steps.handle.outputs.pr_node_id }}";
            const prNumber = "${{ steps.handle.outputs.pr_number }}";

            await github.graphql(
              `mutation EnableAutoMerge($prId: ID!) {
                 enablePullRequestAutoMerge(input: { pullRequestId: $prId }) {
                   pullRequest { autoMergeRequest { enabledAt } }
                 }
               }`,
              { prId: prNodeId }
            );
            core.info(`Auto-merge enabled on PR #${prNumber}.`);
