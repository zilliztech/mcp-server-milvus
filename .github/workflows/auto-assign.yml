name: Auto Assign Issue and PR

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-assign-open-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assign open issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const ownerLines = fs.readFileSync("OWNERS", "utf8")
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter((line) => line && !line.startsWith("#"));

            if (ownerLines.length === 0) {
              core.setFailed("OWNERS has no valid assignees.");
              return;
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }

              const assignees = issue.assignees || [];
              if (assignees.length > 0) {
                core.info(`Issue #${issue.number} already has assignees, skipping.`);
                continue;
              }

              const picked = ownerLines[Math.floor(Math.random() * ownerLines.length)];
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                assignees: [picked]
              });

              core.info(`Assigned issue #${issue.number} to ${picked}.`);
            }

  auto-assign-open-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assign open PRs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const ownerLines = fs.readFileSync("OWNERS", "utf8")
              .split(/\r?\n/)
              .map((line) => line.trim())
              .filter((line) => line && !line.startsWith("#"));

            if (ownerLines.length === 0) {
              core.setFailed("OWNERS has no valid assignees.");
              return;
            }

            const pullRequests = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            for (const pullRequest of pullRequests) {
              const assignees = pullRequest.assignees || [];
              if (assignees.length > 0) {
                core.info(`PR #${pullRequest.number} already has assignees, skipping.`);
                continue;
              }

              const picked = ownerLines[Math.floor(Math.random() * ownerLines.length)];
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                assignees: [picked]
              });

              core.info(`Assigned PR #${pullRequest.number} to ${picked}.`);
            }
